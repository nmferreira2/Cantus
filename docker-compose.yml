services:
  cantus:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: "file:./database/liturgical.db"
      PORT: 3000
    command: >
      sh -c "npm run db:deploy --workspace @cantus/backend && npm start"
    volumes:
      - cantus-data:/app/backend/prisma/database
      - cantus-files:/app/backend/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  cantus-data:
  cantus-files:
